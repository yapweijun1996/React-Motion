<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>SVG: KPI Dashboard</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0C0A09;display:flex;align-items:center;justify-content:center;min-height:100vh}.scene{width:1920px;height:1080px;background:linear-gradient(135deg,#1C1917,#292524);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 64px;gap:24px;transform:scale(0.5);transform-origin:top left}.title{font-family:sans-serif;font-size:64px;font-weight:700;color:#e2e8f0}.svg-wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%}.svg-wrap svg{width:90%;height:auto}</style></head><body>
<div class="scene">
  <div class="title">March Executive KPIs</div>
  <div class="svg-wrap">
    <svg viewBox="0 0 1400 600" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0f766e" stop-opacity="0.8"/><stop offset="100%" stop-color="#0f766e" stop-opacity="0.2"/></linearGradient>
        <linearGradient id="cb" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3b82f6" stop-opacity="0.8"/><stop offset="100%" stop-color="#3b82f6" stop-opacity="0.2"/></linearGradient>
        <linearGradient id="cp" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.8"/><stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.2"/></linearGradient>
        <linearGradient id="cr" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ef4444" stop-opacity="0.8"/><stop offset="100%" stop-color="#ef4444" stop-opacity="0.2"/></linearGradient>
      </defs>

      <!-- KPI Card 1: Revenue -->
      <rect x="30" y="30" width="320" height="260" rx="20" fill="url(#cg)" stroke="#14b8a6" stroke-width="1"/>
      <text x="190" y="75" text-anchor="middle" fill="#5eead4" font-size="16" font-weight="600" font-family="sans-serif">REVENUE</text>
      <text x="190" y="140" text-anchor="middle" fill="#e2e8f0" font-size="56" font-weight="800" font-family="sans-serif">$4.8M</text>
      <rect x="120" y="160" width="140" height="30" rx="15" fill="rgba(34,197,94,0.2)"/><text x="190" y="180" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="700" font-family="sans-serif">+6.7% vs target</text>
      <!-- Mini sparkline -->
      <polyline points="60,230 100,225 140,235 180,220 220,210 260,215 300,200" fill="none" stroke="#14b8a6" stroke-width="2"/>
      <circle cx="300" cy="200" r="4" fill="#14b8a6"/>
      <text x="60" y="260" fill="#64748b" font-size="11" font-family="sans-serif">Sep</text>
      <text x="300" y="260" fill="#64748b" font-size="11" font-family="sans-serif">Mar</text>

      <!-- KPI Card 2: Gross Margin -->
      <rect x="375" y="30" width="320" height="260" rx="20" fill="url(#cb)" stroke="#60a5fa" stroke-width="1"/>
      <text x="535" y="75" text-anchor="middle" fill="#93c5fd" font-size="16" font-weight="600" font-family="sans-serif">GROSS MARGIN</text>
      <text x="535" y="140" text-anchor="middle" fill="#e2e8f0" font-size="56" font-weight="800" font-family="sans-serif">41.2%</text>
      <rect x="465" y="160" width="140" height="30" rx="15" fill="rgba(34,197,94,0.2)"/><text x="535" y="180" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="700" font-family="sans-serif">+2.3pp vs Feb</text>
      <!-- Gauge arc -->
      <path d="M435,235 A100,100 0 0,1 635,235" fill="none" stroke="#1e293b" stroke-width="12" stroke-linecap="round"/>
      <path d="M435,235 A100,100 0 0,1 617,185" fill="none" stroke="#60a5fa" stroke-width="12" stroke-linecap="round"/>
      <text x="535" y="245" text-anchor="middle" fill="#475569" font-size="11" font-family="sans-serif">0%                                    50%</text>

      <!-- KPI Card 3: Churn Rate -->
      <rect x="720" y="30" width="320" height="260" rx="20" fill="url(#cp)" stroke="#a78bfa" stroke-width="1"/>
      <text x="880" y="75" text-anchor="middle" fill="#c4b5fd" font-size="16" font-weight="600" font-family="sans-serif">CHURN RATE</text>
      <text x="880" y="140" text-anchor="middle" fill="#e2e8f0" font-size="56" font-weight="800" font-family="sans-serif">2.8%</text>
      <rect x="810" y="160" width="140" height="30" rx="15" fill="rgba(34,197,94,0.2)"/><text x="880" y="180" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="700" font-family="sans-serif">Below 3.2% target</text>
      <!-- Progress bar -->
      <rect x="750" y="210" width="260" height="14" rx="7" fill="#1e293b"/>
      <rect x="750" y="210" width="170" height="14" rx="7" fill="#a78bfa"/>
      <line x1="958" y1="205" x2="958" y2="230" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3,3"/>
      <text x="958" y="248" text-anchor="middle" fill="#f59e0b" font-size="10" font-family="sans-serif">Target 3.2%</text>
      <text x="750" y="265" fill="#64748b" font-size="10" font-family="sans-serif">0%</text>
      <text x="1010" y="265" text-anchor="end" fill="#64748b" font-size="10" font-family="sans-serif">5%</text>

      <!-- KPI Card 4: New Customers -->
      <rect x="1065" y="30" width="320" height="260" rx="20" fill="url(#cr)" stroke="#f87171" stroke-width="1"/>
      <text x="1225" y="75" text-anchor="middle" fill="#fca5a5" font-size="16" font-weight="600" font-family="sans-serif">NEW CUSTOMERS</text>
      <text x="1225" y="140" text-anchor="middle" fill="#e2e8f0" font-size="56" font-weight="800" font-family="sans-serif">126</text>
      <rect x="1155" y="160" width="140" height="30" rx="15" fill="rgba(239,68,68,0.2)"/><text x="1225" y="180" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="700" font-family="sans-serif">-10% vs 140 target</text>
      <!-- Mini bar comparison -->
      <rect x="1115" y="210" width="30" height="65" rx="4" fill="#475569"/>
      <rect x="1155" y="220" width="30" height="55" rx="4" fill="#f87171"/>
      <rect x="1195" y="215" width="30" height="60" rx="4" fill="#475569"/>
      <rect x="1235" y="225" width="30" height="50" rx="4" fill="#475569"/>
      <rect x="1275" y="200" width="30" height="75" rx="4" fill="#475569"/>
      <rect x="1315" y="230" width="30" height="45" rx="4" fill="#f87171"/>
      <text x="1115" y="285" fill="#64748b" font-size="9" font-family="sans-serif">Oct</text>
      <text x="1315" y="285" fill="#64748b" font-size="9" font-family="sans-serif">Mar</text>

      <!-- Bottom: Cash Runway -->
      <rect x="30" y="320" width="1355" height="130" rx="20" fill="rgba(15,118,110,0.08)" stroke="#0f766e" stroke-width="0.5"/>
      <text x="80" y="365" fill="#5eead4" font-size="18" font-weight="bold" font-family="sans-serif">CASH RUNWAY</text>
      <text x="80" y="395" fill="#e2e8f0" font-size="40" font-weight="800" font-family="sans-serif">14 months</text>
      <!-- Timeline bar -->
      <rect x="400" y="345" width="950" height="20" rx="10" fill="#1e293b"/>
      <rect x="400" y="345" width="555" height="20" rx="10" fill="#0f766e"/>
      <circle cx="955" cy="355" r="8" fill="#14b8a6" stroke="#0C0A09" stroke-width="2"/>
      <text x="400" y="385" fill="#475569" font-size="11" font-family="sans-serif">Apr 2024</text>
      <text x="955" y="385" text-anchor="middle" fill="#14b8a6" font-size="11" font-weight="bold" font-family="sans-serif">Today: Jun 2025</text>
      <text x="1350" y="385" text-anchor="end" fill="#475569" font-size="11" font-family="sans-serif">Jun 2026</text>
      <!-- Milestone markers -->
      <line x1="600" y1="340" x2="600" y2="370" stroke="#334155" stroke-width="1"/><text x="600" y="335" text-anchor="middle" fill="#475569" font-size="9" font-family="sans-serif">Series A close</text>
      <line x1="800" y1="340" x2="800" y2="370" stroke="#334155" stroke-width="1"/><text x="800" y="335" text-anchor="middle" fill="#475569" font-size="9" font-family="sans-serif">Break-even</text>
      <!-- Burn rate -->
      <text x="80" y="430" fill="#64748b" font-size="13" font-family="sans-serif">Monthly burn: $340K | Cash on hand: $4.76M</text>

      <!-- Bottom footer -->
      <text x="700" y="490" text-anchor="middle" fill="#334155" font-size="13" font-family="sans-serif">3 of 4 KPIs on track | Action required: customer acquisition pipeline</text>

      <!-- Status dots -->
      <circle cx="30" y="520" r="6" fill="#22c55e"/><text x="45" y="524" fill="#64748b" font-size="12" font-family="sans-serif">On Track (3)</text>
      <circle cx="180" cy="520" r="6" fill="#ef4444"/><text x="195" y="524" fill="#64748b" font-size="12" font-family="sans-serif">Needs Attention (1)</text>
    </svg>
  </div>
</div>
</body></html>
