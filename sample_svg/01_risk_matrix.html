<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>SVG: Risk Matrix</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0C0A09;display:flex;align-items:center;justify-content:center;min-height:100vh}.scene{width:1920px;height:1080px;background:linear-gradient(135deg,#1C1917,#292524);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 64px;gap:24px;transform:scale(0.5);transform-origin:top left}.title{font-family:sans-serif;font-size:64px;font-weight:700;color:#e2e8f0}.svg-wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%}.svg-wrap svg{width:90%;height:auto}</style></head><body>
<div class="scene">
  <div class="title">Strategic Risk Assessment</div>
  <div class="svg-wrap">
    <svg viewBox="0 0 1400 650" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="rHigh" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ef4444" stop-opacity="0.9"/><stop offset="100%" stop-color="#ef4444" stop-opacity="0.35"/></linearGradient>
        <linearGradient id="rMed" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f59e0b" stop-opacity="0.9"/><stop offset="100%" stop-color="#f59e0b" stop-opacity="0.35"/></linearGradient>
        <linearGradient id="rLow" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#22c55e" stop-opacity="0.9"/><stop offset="100%" stop-color="#22c55e" stop-opacity="0.35"/></linearGradient>
        <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker>
        <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>

      <!-- Axis labels -->
      <text x="30" y="340" text-anchor="middle" fill="#64748b" font-size="16" font-family="sans-serif" transform="rotate(-90,30,340)">IMPACT</text>
      <text x="700" y="640" text-anchor="middle" fill="#64748b" font-size="16" font-family="sans-serif">PROBABILITY</text>
      <line x1="100" y1="20" x2="100" y2="600" stroke="#334155" stroke-width="1"/>
      <line x1="100" y1="600" x2="1380" y2="600" stroke="#334155" stroke-width="1"/>
      <!-- Grid -->
      <line x1="100" y1="200" x2="1380" y2="200" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="8,8"/>
      <line x1="100" y1="400" x2="1380" y2="400" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="8,8"/>
      <line x1="520" y1="20" x2="520" y2="600" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="8,8"/>
      <line x1="940" y1="20" x2="940" y2="600" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="8,8"/>
      <!-- Axis tick labels -->
      <text x="310" y="625" text-anchor="middle" fill="#475569" font-size="13" font-family="sans-serif">Low</text>
      <text x="730" y="625" text-anchor="middle" fill="#475569" font-size="13" font-family="sans-serif">Medium</text>
      <text x="1160" y="625" text-anchor="middle" fill="#475569" font-size="13" font-family="sans-serif">High</text>
      <text x="85" y="505" text-anchor="end" fill="#475569" font-size="13" font-family="sans-serif">Low</text>
      <text x="85" y="305" text-anchor="end" fill="#475569" font-size="13" font-family="sans-serif">Med</text>
      <text x="85" y="115" text-anchor="end" fill="#475569" font-size="13" font-family="sans-serif">High</text>

      <!-- Risk 1: APAC Deal (High impact, Medium probability) -->
      <rect x="600" y="50" width="280" height="130" rx="16" fill="url(#rHigh)" stroke="#ef4444" stroke-width="1.5"/>
      <text x="740" y="90" text-anchor="middle" fill="#fef2f2" font-size="20" font-weight="bold" font-family="sans-serif">APAC Enterprise Deal</text>
      <rect x="630" y="105" width="80" height="28" rx="8" fill="rgba(239,68,68,0.3)"/><text x="670" y="124" text-anchor="middle" fill="#fca5a5" font-size="12" font-family="sans-serif">$1.2M</text>
      <rect x="720" y="105" width="120" height="28" rx="8" fill="rgba(239,68,68,0.3)"/><text x="780" y="124" text-anchor="middle" fill="#fca5a5" font-size="12" font-family="sans-serif">Q2 deadline</text>
      <rect x="640" y="142" width="190" height="26" rx="13" fill="rgba(239,68,68,0.15)"/><text x="735" y="160" text-anchor="middle" fill="#f87171" font-size="11" font-family="sans-serif">Revenue impact: -8% quarterly</text>

      <!-- Risk 2: Acquisition Cost (Medium impact, High probability) -->
      <rect x="1020" y="230" width="280" height="130" rx="16" fill="url(#rMed)" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="1160" y="270" text-anchor="middle" fill="#fefce8" font-size="20" font-weight="bold" font-family="sans-serif">Rising Acquisition Cost</text>
      <rect x="1050" y="285" width="100" height="28" rx="8" fill="rgba(245,158,11,0.3)"/><text x="1100" y="304" text-anchor="middle" fill="#fcd34d" font-size="12" font-family="sans-serif">CAC +22%</text>
      <rect x="1160" y="285" width="100" height="28" rx="8" fill="rgba(245,158,11,0.3)"/><text x="1210" y="304" text-anchor="middle" fill="#fcd34d" font-size="12" font-family="sans-serif">3mo trend</text>
      <rect x="1060" y="322" width="190" height="26" rx="13" fill="rgba(245,158,11,0.15)"/><text x="1155" y="340" text-anchor="middle" fill="#fbbf24" font-size="11" font-family="sans-serif">LTV:CAC ratio at risk: 3.2x</text>

      <!-- Risk 3: Supplier (Low impact, High probability) -->
      <rect x="1020" y="430" width="280" height="130" rx="16" fill="url(#rLow)" stroke="#22c55e" stroke-width="1.5"/>
      <text x="1160" y="470" text-anchor="middle" fill="#f0fdf4" font-size="20" font-weight="bold" font-family="sans-serif">Supplier Dependency</text>
      <rect x="1050" y="485" width="80" height="28" rx="8" fill="rgba(34,197,94,0.3)"/><text x="1090" y="504" text-anchor="middle" fill="#86efac" font-size="12" font-family="sans-serif">1 vendor</text>
      <rect x="1140" y="485" width="120" height="28" rx="8" fill="rgba(34,197,94,0.3)"/><text x="1200" y="504" text-anchor="middle" fill="#86efac" font-size="12" font-family="sans-serif">Diversifying</text>
      <rect x="1060" y="522" width="190" height="26" rx="13" fill="rgba(34,197,94,0.15)"/><text x="1155" y="540" text-anchor="middle" fill="#4ade80" font-size="11" font-family="sans-serif">Mitigation: 2nd vendor onboard Q3</text>

      <!-- Connecting arrows showing escalation path -->
      <path d="M880 115 Q920 115 960 180 Q1000 240 1020 290" stroke="#64748b" stroke-width="1.5" fill="none" stroke-dasharray="6,4" marker-end="url(#arr)"/>
      <path d="M1160 360 L1160 430" stroke="#64748b" stroke-width="1.5" fill="none" stroke-dasharray="6,4" marker-end="url(#arr)"/>

      <!-- Severity legend -->
      <rect x="140" y="30" width="16" height="16" rx="4" fill="#ef4444"/>
      <text x="165" y="43" fill="#94a3b8" font-size="13" font-family="sans-serif">Critical</text>
      <rect x="230" y="30" width="16" height="16" rx="4" fill="#f59e0b"/>
      <text x="255" y="43" fill="#94a3b8" font-size="13" font-family="sans-serif">Warning</text>
      <rect x="330" y="30" width="16" height="16" rx="4" fill="#22c55e"/>
      <text x="355" y="43" fill="#94a3b8" font-size="13" font-family="sans-serif">Managed</text>

      <!-- Decorative corner dots -->
      <circle cx="140" cy="580" r="3" fill="#334155" opacity="0.5"/>
      <circle cx="160" cy="580" r="3" fill="#334155" opacity="0.5"/>
      <circle cx="180" cy="580" r="3" fill="#334155" opacity="0.5"/>
    </svg>
  </div>
</div>
</body></html>
